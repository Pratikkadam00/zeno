name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: typecheck & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # Catch build-time breakage (server components, route types, bad imports)
      # that typecheck + unit tests miss. Next build is the web app's real gate.
      - name: Build web
        run: npm run build --workspace @zeno/web

      # Report dependency advisories on every PR/push, but DO NOT fail the build:
      # nothing deploys from a PR, so a fresh upstream advisory shouldn't redden
      # unrelated work (standards §11). The BLOCKING high/critical gate lives in
      # release.yml, which runs before a release actually ships — that's where a
      # new advisory must stop us.
      - name: Dependency audit (report only)
        continue-on-error: true
        run: npm audit --audit-level=high
