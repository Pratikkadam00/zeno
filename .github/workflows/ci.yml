name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: typecheck & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # Catch build-time breakage (server components, route types, bad imports)
      # that typecheck + unit tests miss. Next build is the web app's real gate.
      - name: Build web
        run: npm run build --workspace @zeno/web

      # Surface and gate on high/critical dependency advisories. Moderate/low
      # (e.g. current Expo transitive advisories) are reported but don't fail.
      - name: Dependency audit
        run: npm audit --audit-level=high
