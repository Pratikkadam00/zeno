# Render Blueprint for the Zeno API (apps/api — Fastify).
# Deploy: on render.com → New → Blueprint → connect this repo. Render reads this
# file, creates the service, and you fill the `sync: false` secrets in the dashboard.
#
# Monorepo note: build runs from the repo root so npm workspaces install, then the
# two workspace packages the API imports (@zeno/shared, @zeno/service-catalog)
# are built to dist/, then the API starts via tsx.
#
# Persistence: the free Postgres below backs the in-memory stores (sync,
# entitlements, households, auth sessions) so they survive restarts/redeploys.
# DATABASE_URL is wired automatically from it. Remove the databases block (and
# the DATABASE_URL env var) to run the API fully in-memory.
databases:
  - name: zeno-db
    plan: free
    databaseName: zeno
    # Render free Postgres expires ~90 days after creation; recreate + reconnect
    # to renew. Data here is non-PII: sync blobs are client-encrypted ciphertext;
    # raw Plaid bank tokens are intentionally never persisted (see plaid.ts).
services:
  - type: web
    name: zeno-api
    runtime: node
    plan: free
    rootDir: .
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: npm install && npm run build --workspace @zeno/shared && npm run build --workspace @zeno/service-catalog
    startCommand: npm run start --workspace @zeno/api
    envVars:
      # ── Non-secret config (safe to keep here) ──
      - key: NODE_ENV
        value: production
      - key: API_HOST
        value: 0.0.0.0
      - key: JWT_ISSUER
        value: zeno-api
      - key: JWT_AUDIENCE
        value: zeno-mobile
      - key: PLAID_ENV
        value: sandbox
      - key: CORS_ALLOWED_ORIGINS
        value: ""
      # Where the magic-link email points (the mobile deep link):
      - key: MAGIC_LINK_REDIRECT_URL
        value: zeno://auth/verify
      # AI coach provider (anthropic | groq); auto-detects from the keys if unset:
      - key: COACH_PROVIDER
        value: anthropic
      # Postgres connection string, pulled from the managed database above so the
      # stores persist across restarts (TLS required — handled by default in code):
      - key: DATABASE_URL
        fromDatabase:
          name: zeno-db
          property: connectionString

      # ── Secrets — set these in the Render dashboard (never committed) ──
      # Recommended so tokens survive restarts (else an ephemeral key is generated
      # and everyone is logged out on each redeploy/wake):
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      # Required to actually log in via magic link (Resend free tier works):
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      # Optional features:
      - key: ANTHROPIC_API_KEY     # AI coach (Claude — default provider)
        sync: false
      - key: GROQ_API_KEY          # AI coach (free fallback provider)
        sync: false
      - key: PLAID_CLIENT_ID       # bank connect (sandbox)
        sync: false
      - key: PLAID_SECRET
        sync: false
      - key: REVENUECAT_SECRET_KEY # server-side entitlement verification
        sync: false
      - key: REVENUECAT_WEBHOOK_AUTH
        sync: false
      # 32-byte hex/base64 key; encrypts Plaid bank tokens at rest so they can be
      # persisted (without it, Plaid tokens stay in-memory and reset on restart):
      - key: STORAGE_ENCRYPTION_KEY
        sync: false
      # Optional: shared rate-limit store so limits hold across instances. Only
      # needed when scaling past one instance; leave unset for the single free node.
      - key: REDIS_URL
        sync: false
      # Optional: webhook for 5xx error alerts (route + message + request id only).
      - key: MONITORING_WEBHOOK_URL
        sync: false
      # Social login audiences (server verifies tokens against these):
      - key: GOOGLE_WEB_CLIENT_ID
        sync: false
      - key: GOOGLE_IOS_CLIENT_ID
        sync: false
      - key: GOOGLE_ANDROID_CLIENT_ID
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
