<!-- @dsCard group="Slides" viewport="1280x720" name="Quote Slide" subtitle="Accent-green testimonial" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; }
  .slide { width: 1280px; height: 720px; background: var(--green-500); color: var(--ink-900); position: relative; overflow: hidden; font-family: var(--font-sans); padding: 110px 120px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; }
  .mark { font-family: var(--font-display); font-size: 160px; font-weight: 700; line-height: 0.6; opacity: 0.18; height: 70px; }
  blockquote { font-family: var(--font-display); font-weight: 600; font-size: 54px; line-height: 1.18; letter-spacing: -0.02em; margin: 0; max-width: 22ch; text-wrap: balance; }
  .who { display: flex; align-items: center; gap: 16px; margin-top: 48px; }
  .av { width: 52px; height: 52px; border-radius: 50%; background: var(--ink-900); color: var(--green-400); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 22px; }
  .who b { display: block; font-size: 19px; font-weight: 700; }
  .who span { font-size: 16px; color: var(--green-900); opacity: 0.7; }
  .foot { position: absolute; bottom: 56px; right: 96px; font-size: 14px; color: var(--green-900); opacity: 0.6; font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="slide">
    <div class="mark">"</div>
    <blockquote>I cancelled four subscriptions in my first week. Zeno paid for itself instantly.</blockquote>
    <div class="who">
      <div class="av">M</div>
      <div><b>Mara Lindqvist</b><span>Early access user</span></div>
    </div>
    <div class="foot">zeno · 05</div>
  </div>
</body>
</html>
