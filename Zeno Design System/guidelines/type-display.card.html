<!-- @dsCard group="Type" viewport="700x250" name="Display — Space Grotesk" subtitle="Headlines, balances, big moments" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); }
  .spec { display: flex; flex-direction: column; gap: 14px; }
  .line { display: flex; align-items: baseline; gap: 16px; }
  .txt { font-family: var(--font-display); color: var(--text-primary); letter-spacing: var(--ls-tight); line-height: 1.05; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); white-space: nowrap; }
</style>
</head>
<body>
  <div class="spec">
    <div class="line"><span class="txt" style="font-size:48px;font-weight:700">All in one view</span><span class="meta">48 / 700</span></div>
    <div class="line"><span class="txt" style="font-size:36px;font-weight:700">Take control</span><span class="meta">36 / 700</span></div>
    <div class="line"><span class="txt" style="font-size:28px;font-weight:600">This month</span><span class="meta">28 / 600</span></div>
  </div>
</body>
</html>
