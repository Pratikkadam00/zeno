<!-- @dsCard group="Colors" viewport="700x170" name="Semantic" subtitle="Success, warning, danger, info — solid & soft" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-card); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .col { display: flex; flex-direction: column; gap: 6px; }
  .solid { height: 44px; border-radius: var(--radius-md); display: flex; align-items: center; padding: 0 12px; color: #fff; font-size: 12px; font-weight: 600; }
  .soft { height: 30px; border-radius: var(--radius-sm); display: flex; align-items: center; padding: 0 12px; font-size: 11px; font-weight: 600; }
  .name { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="grid">
    <div class="col"><div class="solid" style="background:var(--success)">Success</div><div class="soft" style="background:var(--success-soft);color:var(--success)">soft</div><div class="name">--success</div></div>
    <div class="col"><div class="solid" style="background:var(--warning);color:var(--ink-900)">Warning</div><div class="soft" style="background:var(--warning-soft);color:#B45309">soft</div><div class="name">--warning</div></div>
    <div class="col"><div class="solid" style="background:var(--danger)">Danger</div><div class="soft" style="background:var(--danger-soft);color:var(--danger)">soft</div><div class="name">--danger</div></div>
    <div class="col"><div class="solid" style="background:var(--info)">Info</div><div class="soft" style="background:var(--info-soft);color:var(--info)">soft</div><div class="name">--info</div></div>
  </div>
</body>
</html>
