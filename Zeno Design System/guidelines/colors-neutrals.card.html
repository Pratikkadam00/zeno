<!-- @dsCard group="Colors" viewport="700x190" name="Ink Neutrals" subtitle="Text, borders & surfaces on warm paper" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-card); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-xs); border: 1px solid var(--border-subtle); }
  .sw { flex: 1; height: 64px; }
  .labels { display: flex; margin-top: 8px; }
  .lab { flex: 1; font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); text-align: center; }
  .lab b { display: block; color: var(--text-secondary); font-weight: 600; }
  .note { margin-top: 14px; font-family: var(--font-sans); font-size: 12px; color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="row" id="row"></div>
  <div class="labels" id="labels"></div>
  <div class="note">900 = primary text · 500 = secondary · 100/200 = borders · 50 = sunken surface · paper = app bg.</div>
  <script>
    const steps = [
      ['900','--ink-900'],['800','--ink-800'],['700','--ink-700'],['600','--ink-600'],['500','--ink-500'],
      ['400','--ink-400'],['300','--ink-300'],['200','--ink-200'],['100','--ink-100'],['50','--ink-50'],['paper','--paper']
    ];
    const row = document.getElementById('row'), labels = document.getElementById('labels');
    steps.forEach(([n,v]) => {
      const d = document.createElement('div'); d.className = 'sw'; d.style.background = `var(${v})`;
      row.appendChild(d);
      const l = document.createElement('div'); l.className = 'lab'; l.innerHTML = `<b>${n}</b>`;
      labels.appendChild(l);
    });
  </script>
</body>
</html>
